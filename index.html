<!DOCTYPE html>
<html>
<head>
    <title>Model Evaluation Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1> Model Evaluation</h1>
    <p class="subtitle">Analyze ML model performance</p>

    <button onclick="runEvaluation()">Run Evaluation</button>
    <button onclick="loadPredictions()">Show Predictions (Randomly Selected)</button>

    <div id="result"></div>
    <div id="table"></div>

</div>

<script>

const API_URL = "https://evaluation-metrics-api-1.onrender.com";

async function runEvaluation() {
    document.getElementById("result").innerHTML = "Loading...";

    try {
        const res = await fetch(`${API_URL}/evaluate`);
        const data = await res.json();

        document.getElementById("result").innerHTML = `
            <strong>Accuracy:</strong> ${data.accuracy.toFixed(3)} <br>
            <strong>Precision:</strong> ${data.precision.toFixed(3)} <br>
            <strong>Recall:</strong> ${data.recall.toFixed(3)} <br>
            <strong>AUC:</strong> ${data.auc.toFixed(3)}
        `;
    } catch (err) {
        document.getElementById("result").innerHTML = "Error loading metrics";
    }
}

async function loadPredictions() {
    const tableDiv = document.getElementById("table");
    tableDiv.innerHTML = "Loading...";

    try {
        const res = await fetch(`${API_URL}/predictions`);
        const data = await res.json();

        let html = `
        <table>
            <tr>
                <th>Actual</th>
                <th>Predicted</th>
                <th>Probability</th>
            </tr>
        `;

        data.forEach(row => {
            const isCorrect = row.actual === row.predicted;
            const rowClass = isCorrect ? "correct" : "wrong";

            html += `
            <tr class="${rowClass}">
                <td>${row.actual}</td>
                <td>${row.predicted}</td>
                <td class="prob-high">${row.probability.toFixed(2)}</td>
            </tr>`;
        });

        html += "</table>";
        tableDiv.innerHTML = html;

    } catch (err) {
        tableDiv.innerHTML = "Error loading predictions";
    }
}

</script>

</body>
</html>
